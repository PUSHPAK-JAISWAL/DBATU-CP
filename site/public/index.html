<body>

<header>
  <h1>DBATU Competitive Programming</h1>
  <input class="search" id="search" placeholder="Search problem...">
</header>

<div class="container">
  <div id="problems"></div>
</div>

<script>
  let allProblems = [];

  fetch("data.json")
    .then(res => res.json())
    .then(data => {
      allProblems = data;
      render(data);
    });

  function render(data) {
    const container = document.getElementById("problems");
    container.innerHTML = "";

    data.forEach(problem => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <h3>${problem.title}</h3>
        <p>${problem.question.substring(0, 180)}...</p>
        <a href="problem.html?id=${problem.id}">View Solutions →</a>
      `;
      container.appendChild(div);
    });
  }

  document.getElementById("search").addEventListener("input", e => {
    const value = e.target.value.toLowerCase();

    const filtered = allProblems.filter(p =>
      p.title.toLowerCase().includes(value) ||
      p.question.toLowerCase().includes(value)
    );

    render(filtered);
  });
</script>

</body>
