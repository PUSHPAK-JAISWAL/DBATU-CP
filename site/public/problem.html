<script>
const id = new URLSearchParams(location.search).get('id');
const langMap = {
  cpp:'cpp','c++':'cpp', c:'c', python:'python', java:'java',
  javascript:'javascript', js:'javascript', typescript:'typescript', ts:'typescript',
  bash:'bash', r:'r', v:'markup', arduino:'cpp'
};

function cleanTitle(raw) {
  return raw.replace(/^\d+\s+/, '').trim();
}

fetch('data.json')
  .then(r => r.json())
  .then(data => loadProblem(data))
  .catch(() => {
    loadProblem([{
      id:'3nplus1',
      title:'100       The 3n + 1 problem',
      question:`Problems in Computer Science are often classified as belonging to a certain class of problems (e.g., NP, Unsolvable, Recursive). In this problem you will be analyzing a property of an algorithm whose classification is not known for all possible inputs.

Consider the following algorithm:

  1.  input n
  2.  print n
  3.  if n = 1 then STOP
  4.       if n is odd then n ← 3n + 1
  5.       else n ← n/2
  6.  GOTO 2

Given the input 22, the following sequence of numbers will be printed:
  22 11 34 17 52 26 13 40 20 10 5 16 8 4 2 1

It is conjectured that the algorithm above will terminate (when a 1 is printed) for any integral input value.

Given an input n, it is possible to determine the number of numbers printed before and including the 1 is printed. For a given n this is called the cycle-length of n. In the example above, the cycle length of 22 is 16.

For any two numbers i and j you are to determine the maximum cycle length over all numbers between and including both i and j.

Input
The input will consist of a series of pairs of integers i and j, one pair per line. All integers will be less than 10,000 and greater than 0.

Output
For each pair output i, j, and the maximum cycle length, separated by at least one space.

Sample Input     Sample Output
1 10             1 10 20
100 200          100 200 125
201 210          201 210 89
900 1000         900 1000 174`,
      solutions:{
        C:`#include <stdio.h>
#define MAX 1000000
long memo[MAX] = {0};

long cycleLength(long n) {
    if (n == 1) return 1;
    if (n < MAX && memo[n] != 0) return memo[n];

    long length;
    if (n % 2 == 0) length = 1 + cycleLength(n / 2);
    else            length = 1 + cycleLength(3 * n + 1);

    if (n < MAX) memo[n] = length;
    return length;
}

int main() {
    long i, j;
    while (scanf("%ld %ld", &i, &j) == 2) {
        long start = i < j ? i : j;
        long end   = i > j ? i : j;
        long maxCycle = 0;
        for (long k = start; k <= end; k++) {
            long len = cycleLength(k);
            if (len > maxCycle) maxCycle = len;
        }
        printf("%ld %ld %ld\\n", i, j, maxCycle);
    }
    return 0;
}`,
        'C++':`#include <iostream>
#include <unordered_map>
using namespace std;

unordered_map<long long, long long> memo;

long long cycleLength(long long n) {
    if (n == 1) return 1;
    if (memo.count(n)) return memo[n];

    long long length;
    if (n % 2 == 0) length = 1 + cycleLength(n / 2);
    else            length = 1 + cycleLength(3 * n + 1);

    return memo[n] = length;
}

int main() {
    ios::sync_with_stdio(false);
    cin.tie(NULL);
    long long i, j;
    while (cin >> i >> j) {
        long long start = min(i, j), end = max(i, j);
        long long maxCycle = 0;
        for (long long k = start; k <= end; k++)
            maxCycle = max(maxCycle, cycleLength(k));
        cout << i << " " << j << " " << maxCycle << "\\n";
    }
    return 0;
}`,
        Python:`import sys
sys.setrecursionlimit(100000)

memo = {1: 1}

def cycle_length(n):
    if n in memo:
        return memo[n]
    if n % 2 == 0:
        length = 1 + cycle_length(n // 2)
    else:
        length = 1 + cycle_length(3 * n + 1)
    memo[n] = length
    return length

for line in sys.stdin:
    line = line.strip()
    if not line:
        continue
    i, j = map(int, line.split())
    start, end = min(i, j), max(i, j)
    max_cycle = max(cycle_length(k) for k in range(start, end + 1))
    print(i, j, max_cycle)`,
        Java:`import java.util.*;

public class solution {
    static HashMap<Long, Long> memo = new HashMap<>();

    public static long cycleLength(long n) {
        if (n == 1) return 1;
        if (memo.containsKey(n)) return memo.get(n);

        long length;
        if (n % 2 == 0) length = 1 + cycleLength(n / 2);
        else            length = 1 + cycleLength(3 * n + 1);

        memo.put(n, length);
        return length;
    }

    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);
        while (sc.hasNextLong()) {
            long i = sc.nextLong(), j = sc.nextLong();
            long start = Math.min(i, j), end = Math.max(i, j);
            long maxCycle = 0;
            for (long k = start; k <= end; k++)
                maxCycle = Math.max(maxCycle, cycleLength(k));
            System.out.println(i + " " + j + " " + maxCycle);
        }
        sc.close();
    }
}`
      }
    }]);
  });

function loadProblem(data) {
  const problem = data.find(p => p.id === id) || data[0];
  if (!problem) return;

  const title = cleanTitle(problem.title);
  document.title = `${title} — DBATU CP`;
  document.getElementById('prob-title').textContent = title;
  document.getElementById('crumb-title').textContent = title;
  document.getElementById('prob-q').textContent = problem.question;

  const langs = Object.keys(problem.solutions || {});
  const countEl = document.getElementById('prob-lang-count');
  countEl.innerHTML = langs.map(l => `<span class="lang-chip">${l}</span>`).join('');

  // Prev / Next
  const idx = data.findIndex(p => p.id === problem.id);
  if (idx > 0) {
    const el = document.getElementById('nav-prev');
    el.href = `problem.html?id=${data[idx-1].id}`;
    el.classList.remove('hidden');
    document.getElementById('prev-label').textContent = cleanTitle(data[idx-1].title);
  }
  if (idx < data.length - 1) {
    const el = document.getElementById('nav-next');
    el.href = `problem.html?id=${data[idx+1].id}`;
    el.classList.remove('hidden');
    document.getElementById('next-label').textContent = cleanTitle(data[idx+1].title);
  }

  // Build solution tabs + blocks
  const tabsWrap = document.getElementById('lang-tabs');
  const solsWrap = document.getElementById('solutions');
  const sols     = problem.solutions || {};

  if (!langs.length) {
    solsWrap.innerHTML = '<div class="no-sol">No solutions available yet.</div>';
    return;
  }

  langs.forEach((lang, i) => {
    // Tab button
    const tab = document.createElement('button');
    tab.className   = `ltab${i === 0 ? ' active' : ''}`;
    tab.textContent = lang;
    tab.dataset.lang = lang;
    tab.addEventListener('click', () => activate(lang));
    tabsWrap.appendChild(tab);

    // Solution block
    const cls = langMap[lang.toLowerCase()] || 'clike';
    const code = sols[lang] || '// No solution provided yet.';
    const escaped = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

    const block = document.createElement('div');
    block.className   = `sol-block${i === 0 ? '' : ' hidden'}`;
    block.dataset.lang = lang;

    block.innerHTML = `
      <div class="code-topbar">
        <div class="code-dots">
          <span class="code-dot cd-r"></span>
          <span class="code-dot cd-y"></span>
          <span class="code-dot cd-g"></span>
        </div>
        <span class="code-filename">${filenameFor(lang, title)}</span>
        <div class="code-actions">
          <button class="act-btn copy-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy
          </button>
          <button class="act-btn dl-btn">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
          </button>
        </div>
      </div>
      <div class="code-scroll">
        <pre class="code-pre"><code class="language-${cls}">${escaped}</code></pre>
      </div>
    `;

    block.querySelector('.copy-btn').addEventListener('click', function() {
      navigator.clipboard.writeText(code).then(() => {
        this.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
        this.classList.add('copied');
        setTimeout(() => {
          this.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
          this.classList.remove('copied');
        }, 2000);
      });
    });

    block.querySelector('.dl-btn').addEventListener('click', () => {
      const ext = {c:'c',cpp:'cpp','c++':'cpp',python:'py',java:'java',javascript:'js',typescript:'ts',bash:'sh',r:'r',v:'v',arduino:'ino'}[lang.toLowerCase()] || 'txt';
      const slug = title.replace(/\s+/g,'_').toLowerCase();
      const blob = new Blob([code], {type:'text/plain'});
      Object.assign(document.createElement('a'), {href:URL.createObjectURL(blob), download:`${slug}.${ext}`}).click();
    });

    solsWrap.appendChild(block);
  });

  setTimeout(() => { if (window.Prism) Prism.highlightAll(); }, 100);
}

function activate(lang) {
  document.querySelectorAll('.ltab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));
  document.querySelectorAll('.sol-block').forEach(b => b.classList.toggle('hidden', b.dataset.lang !== lang));
}

function filenameFor(lang, title) {
  const slug = title.toLowerCase().replace(/\s+/g,'_').replace(/[^a-z0-9_]/g,'').substring(0,20);
  const ext  = {c:'c',cpp:'cpp','c++':'cpp',python:'py',java:'java',javascript:'js',typescript:'ts',bash:'sh',r:'r',v:'v',arduino:'ino'}[lang.toLowerCase()] || 'txt';
  return `${slug}.${ext}`;
}

document.getElementById('share-btn').addEventListener('click', function() {
  navigator.clipboard.writeText(location.href).then(() => {
    const orig = this.innerHTML;
    this.textContent = '✓ Link copied';
    setTimeout(() => { this.innerHTML = orig; }, 2000);
  });
});
</script>
